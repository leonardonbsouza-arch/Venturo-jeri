<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Venturo Jeri | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #080b0d;
        --lime: #a6d719;
        --white: #ffffff;
        --muted: rgba(255, 255, 255, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--white);
        background:
          linear-gradient(180deg, rgba(8, 11, 13, 0.6), #080b0d 62%),
          url("public/refeita.png") center top / cover fixed;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(520px, 100%);
        margin: 0 auto;
        padding: 34px 18px 42px;
      }

      .profile {
        display: grid;
        justify-items: center;
        gap: 12px;
        text-align: center;
      }

      .profile img {
        width: 112px;
        height: 112px;
        border: 3px solid var(--lime);
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
      }

      h1,
      h2 {
        margin: 0;
        font-family: "Barlow Condensed", Impact, sans-serif;
        line-height: 0.94;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3.4rem, 16vw, 5rem);
      }

      h2 {
        margin-bottom: 14px;
        font-size: 2.4rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .links {
        display: grid;
        gap: 12px;
        margin: 28px 0 34px;
      }

      .link-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 58px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        color: var(--white);
        background: rgba(8, 11, 13, 0.74);
        text-decoration: none;
        font-weight: 900;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(14px);
      }

      .link-button.primary {
        color: var(--ink);
        background: var(--lime);
        border-color: var(--lime);
      }

      .link-button span:last-child {
        font-size: 1.4rem;
      }

      .video-list {
        display: grid;
        gap: 14px;
      }

      video {
        width: 100%;
        aspect-ratio: 9 / 14;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: #000;
        object-fit: cover;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      }

      footer {
        margin-top: 30px;
        color: rgba(255, 255, 255, 0.58);
        text-align: center;
        font-size: 0.86rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="profile" aria-label="Venturo Jeri">
        <img src="public/WhatsApp Image 2026-07-04 at 22.17.35.jpeg" alt="Venturo Jeri Offroad" />
        <h1>Venturo Jeri</h1>
        <p>UTV off-road em Jericoacoara. Passeios, dunas, praia e adrenalina.</p>
      </section>

      <nav class="links" aria-label="Links principais">
        <a class="link-button" href="index.html">
          <span>Link do site</span>
          <span>›</span>
        </a>
        <a class="link-button" href="#passeios">
          <span>Passeios com videos</span>
          <span>›</span>
        </a>
        <a class="link-button primary" href="index.html#reserva">
          <span>Faca sua reserva</span>
          <span>›</span>
        </a>
      </nav>

      <section id="passeios" aria-labelledby="passeios-title">
        <h2 id="passeios-title">Passeios</h2>
        <div class="video-list">
          <video controls playsinline poster="public/refeita.png">
            <source src="public/WhatsApp Video 2026-07-04 at 22.17.34.mp4" type="video/mp4" />
          </video>
        </div>
      </section>

      <footer>venturojeri.com</footer>
    </main>
  </body>
</html>
